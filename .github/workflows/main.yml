name: Flutter CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5' # Adjust to your project's version
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Static Analysis
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test

      - name: Build Admin APK
        run: |
          flutter build apk --release --flavor admin -t lib/admin_user_main/admin_main/main.dart

      - name: Build User APK
        run: |
          flutter build apk --release --flavor user -t lib/admin_user_main/user_main/main.dart

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: upload User artifact to Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        uses: w9jds/firebase-action@master
        with:
          args: >-
            appdistribution:distribute build/app/outputs/flutter-apk/app-user-release.apk
            --app ${{ secrets.FIREBASE_APP_ID }}
            --groups "testers"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: upload Admin artifact to Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        uses: w9jds/firebase-action@master
        with:
          args: >-
            appdistribution:distribute build/app/outputs/flutter-apk/app-admin-release.apk
            --app ${{ secrets.FIREBASE_ADMIN_APP_ID }}
            --groups "testers"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
